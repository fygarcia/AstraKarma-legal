<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstraKarma Legal & Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --background: #221e10;
            --background-secondary: #1a1708;
            --primary: #7B2CBF;
            --accent: #f2b90d;
            --text-primary: #FFFFFF;
            --text-secondary: #E0AAFF;
            --surface-mid: rgba(255, 255, 255, 0.7);
            --surface-border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--background);
            background-image: radial-gradient(circle at 50% -20%, rgba(123, 44, 191, 0.6), transparent 60%);
            color: var(--text-primary);
            font-family: 'Lato', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Twinkling stars effect background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: transparent url('data:image/svg+xml;utf8,<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="1" fill="white" opacity="0.8"/><circle cx="150" cy="80" r="1.5" fill="white" opacity="0.5"/><circle cx="300" cy="40" r="1" fill="white" opacity="0.7"/><circle cx="80" cy="200" r="1.5" fill="white" opacity="0.6"/><circle cx="240" cy="250" r="1" fill="white" opacity="0.9"/><circle cx="350" cy="300" r="1.2" fill="white" opacity="0.4"/><circle cx="50" cy="350" r="1" fill="white" opacity="0.5"/></svg>') repeat;
            z-index: 0;
            animation: twinkle 5s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .container {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Noto Serif', serif;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-align: center;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        p.subtitle {
            font-family: 'Noto Serif', serif;
            color: var(--surface-mid);
            text-align: center;
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 3rem;
            max-width: 80%;
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            width: 100%;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 1.5rem;
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(123, 44, 191, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .glass-card:hover::before {
            opacity: 1;
        }

        .glass-card:active {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .link-content {
            display: flex;
            flex-direction: column;
            z-index: 2;
        }

        .link-title {
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
        }

        .link-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0;
        }

        .icon-arrow {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: var(--accent);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 2;
        }

        .glass-card:hover .icon-arrow {
            transform: translateX(4px);
        }

        /* Mobile specific adjustments */
        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }
            .glass-card {
                padding: 1.25rem;
            }
            p.subtitle {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <h1>AstraKarma</h1>
        <p class="subtitle">Legal Documents &amp; Support</p>

        <div class="links-grid">
            <a href="privacy-policy.html" class="glass-card">
                <div class="link-content">
                    <span class="link-title">Privacy Policy</span>
                    <span class="link-desc">Learn how we protect your cosmic data</span>
                </div>
                <svg class="icon-arrow" viewBox="0 0 24 24">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>

            <a href="terms-of-service.html" class="glass-card">
                <div class="link-content">
                    <span class="link-title">Terms of Service</span>
                    <span class="link-desc">Rules and guidances for your journey</span>
                </div>
                <svg class="icon-arrow" viewBox="0 0 24 24">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>

            <a href="support.html" class="glass-card">
                <div class="link-content">
                    <span class="link-title">Support Directory</span>
                    <span class="link-desc">Reach out for assistance or feedback</span>
                </div>
                <svg class="icon-arrow" viewBox="0 0 24 24">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </a>
        </div>
    </div>
</body>
</html>
